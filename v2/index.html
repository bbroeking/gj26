<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Lumbridge — gj26 v2</title>
<style>
  :root {
    --bg: #0d0d10;
    --panel: #181820;
    --border: #2a2a36;
    --gold: #d4af37;
    --text: #e8e8ee;
    --dim: #888;
    --hp: #c0392b;
    --xp: #2a8b6c;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--text);
    font-family: 'Courier New', ui-monospace, monospace;
    height: 100%;
  }
  body { display: flex; justify-content: center; align-items: center; padding: 12px; min-height: 100vh; user-select: none; }
  #wrap { display: grid; grid-template-columns: 800px 260px; gap: 12px; }

  #stage { position: relative; width: 800px; height: 576px; background: #000; border: 4px solid var(--border); border-radius: 4px; }
  canvas { display: block; image-rendering: pixelated; image-rendering: crisp-edges; }
  #title { position: absolute; top: 6px; left: 8px; font-size: 11px; color: var(--gold); text-shadow: 1px 1px 0 #000; pointer-events: none; }

  #panel { background: var(--panel); border: 4px solid var(--border); border-radius: 4px; padding: 10px; height: 576px; display: flex; flex-direction: column; font-size: 12px; }
  .section { margin-bottom: 10px; }
  .section h1 {
    font-size: 11px; letter-spacing: 1px;
    color: var(--gold);
    margin: 0 0 4px 0;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
    padding-bottom: 2px;
  }

  .stat-row { display: flex; justify-content: space-between; align-items: center; margin: 3px 0; }
  .stat-label { color: var(--dim); }
  .bar { height: 10px; background: #0a0a0e; border: 1px solid var(--border); margin-top: 2px; overflow: hidden; }
  .bar.tiny { height: 5px; }
  .bar-fill { height: 100%; transition: width 180ms ease-out; }
  .bar-fill.hp { background: var(--hp); }
  .bar-fill.xp { background: var(--xp); }

  #skills { margin-top: 6px; display: grid; grid-template-columns: 1fr 1fr; gap: 3px 8px; }
  #skills .sk { font-size: 10px; color: var(--dim); }
  #skills .sk .row { display: flex; justify-content: space-between; }
  #skills .sk .lv { color: var(--text); }

  #equipped { background: #0a0a0e; border: 1px solid var(--border); padding: 4px; font-size: 10px; line-height: 1.5; }
  #equipped .eq-slot { display: flex; justify-content: space-between; padding: 1px 2px; }
  #equipped .eq-slot .empty { color: #555; }
  #equipped .eq-slot span:first-child { color: var(--dim); text-transform: uppercase; font-size: 9px; }

  #inv { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
  .slot {
    aspect-ratio: 1 / 1;
    background: #0a0a0e;
    border: 1px solid var(--border);
    position: relative;
    font-size: 9px;
    color: var(--gold);
    display: flex; align-items: flex-end; justify-content: flex-end;
    padding: 1px;
    cursor: pointer;
  }
  .slot[data-idx]:hover { border-color: var(--gold); }
  .slot .icon { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; }

  #quest { background: #0a0a0e; border: 1px dashed var(--border); padding: 6px; font-size: 11px; line-height: 1.5; min-height: 60px; }
  #quest .step { color: var(--dim); }
  #quest .step.active { color: var(--gold); }
  #quest .step.done { color: #4a8; text-decoration: line-through; }

  #log { flex: 1; background: #060608; border: 1px solid var(--border); padding: 5px; font-size: 10px; overflow: hidden; line-height: 1.4; color: #aaa; }
  #log .entry { margin: 1px 0; }
  #log .entry.combat { color: #e88; }
  #log .entry.skill { color: #8c8; }
  #log .entry.quest { color: var(--gold); }
  #log .entry.hint { color: #6cb; }

  #controls { font-size: 10px; color: var(--dim); text-align: center; margin-top: 4px; }
  kbd { display: inline-block; padding: 1px 4px; background: #222; border: 1px solid #333; border-radius: 2px; font-size: 9px; color: #ddd; }
</style>
</head>
<body>
<div id="wrap">
  <div id="stage">
    <canvas id="game" width="800" height="576"></canvas>
    <div id="title">LUMBRIDGE — gj26 v2 (canvas + ES modules)</div>
  </div>
  <div id="panel">
    <div class="section">
      <h1>Adventurer</h1>
      <div class="stat-row"><span class="stat-label">HP</span><span><span id="hp-num">10</span>/<span id="hp-max">10</span></span></div>
      <div class="bar"><div id="hp-bar" class="bar-fill hp" style="width:100%"></div></div>
      <div id="skills"></div>
    </div>
    <div class="section">
      <h1>Equipped</h1>
      <div id="equipped"></div>
    </div>
    <div class="section">
      <h1>Inventory (28)</h1>
      <div id="inv"></div>
    </div>
    <div class="section">
      <h1>Quest</h1>
      <div id="quest"></div>
    </div>
    <div class="section" style="flex:1; display:flex; flex-direction:column; min-height:0">
      <h1>Log</h1>
      <div id="log"></div>
    </div>
    <div id="controls">
      <kbd>WASD</kbd>/<kbd>Arrows</kbd> move &nbsp; <kbd>Space</kbd>/<kbd>E</kbd> interact
    </div>
  </div>
</div>
<script type="module" src="src/main.js"></script>
</body>
</html>
